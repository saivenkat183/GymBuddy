<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GymBuddy</title>
<link rel="stylesheet" href="style.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen">
  <div class="authBox">
    <h1>💪 GymBuddy</h1>
    <p>Track your gains, crush your PRs</p>
    <div id="authMsg" class="authMsg hidden"></div>
    <input id="authUser" type="text" placeholder="Username"/>
    <input id="authPass" type="password" placeholder="Password"/>
    <div id="authNameWrap" class="hidden">
      <input id="authName" type="text" placeholder="Display Name"/>
    </div>
    <button class="btn" onclick="doAuth()">Login</button>
    <button class="btn sec" onclick="toggleAuthMode()">Don't have an account? Register</button>
  </div>
</div>

<!-- APP SCREEN -->
<div id="appScreen">
  <nav>
    <div class="logo">💪 GymBuddy</div>
    <div class="navRight">
      <span id="navUser"></span>
      <button class="navBtn active" onclick="showPage('bodyPage',this)">Body Map</button>
      <button class="navBtn" onclick="showPage('historyPage',this)">History</button>
      <button class="navBtn" onclick="showPage('progressPage',this)">Progress</button>
      <button class="navBtn" onclick="logout()">Logout</button>
    </div>
  </nav>
  <main>
    <!-- BODY MAP PAGE -->
    <div class="page active" id="bodyPage">
      <div class="bodyPage">
        <div class="viewToggle">
          <button class="viewBtn active" id="btnFront" onclick="setView('front')">Front</button>
          <button class="viewBtn" id="btnBack" onclick="setView('back')">Back</button>
        </div>
        <div class="bodyWrap">
          <!-- FRONT SVG -->
          <svg id="svgFront" viewBox="0 0 200 420" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="100" cy="30" rx="22" ry="26" fill="#3a3a3a"/>
            <rect x="91" y="54" width="18" height="14" fill="#3a3a3a"/>
            <rect x="60" y="68" width="80" height="90" rx="8" fill="#2a2a2a"/>
            <g class="muscle-group" fill="#e05555" data-muscle="Chest" onclick="openMuscle('Chest')">
              <rect x="63" y="70" width="34" height="38" rx="5"/>
              <rect x="103" y="70" width="34" height="38" rx="5"/>
            </g>
            <g class="muscle-group" fill="#d4784a" data-muscle="Shoulders" onclick="openMuscle('Shoulders')">
              <ellipse cx="52" cy="82" rx="14" ry="18"/>
              <ellipse cx="148" cy="82" rx="14" ry="18"/>
            </g>
            <g class="muscle-group" fill="#4a8fd4" data-muscle="Abs" onclick="openMuscle('Abs')">
              <rect x="82" y="112" width="14" height="12" rx="3"/>
              <rect x="104" y="112" width="14" height="12" rx="3"/>
              <rect x="82" y="128" width="14" height="12" rx="3"/>
              <rect x="104" y="128" width="14" height="12" rx="3"/>
              <rect x="82" y="144" width="14" height="12" rx="3"/>
              <rect x="104" y="144" width="14" height="12" rx="3"/>
            </g>
            <g class="muscle-group" fill="#50b86c" data-muscle="Biceps" onclick="openMuscle('Biceps')">
              <rect x="30" y="100" width="16" height="42" rx="8"/>
              <rect x="154" y="100" width="16" height="42" rx="8"/>
            </g>
            <g class="muscle-group" fill="#7db87a" data-muscle="Forearms" onclick="openMuscle('Forearms')">
              <rect x="22" y="146" width="14" height="46" rx="7"/>
              <rect x="164" y="146" width="14" height="46" rx="7"/>
            </g>
            <rect x="60" y="158" width="80" height="22" rx="6" fill="#2a2a2a"/>
            <g class="muscle-group" fill="#9b59b6" data-muscle="Quadriceps" onclick="openMuscle('Quadriceps')">
              <rect x="62" y="182" width="34" height="72" rx="10"/>
              <rect x="104" y="182" width="34" height="72" rx="10"/>
            </g>
            <g class="muscle-group" fill="#c0a050" data-muscle="Calves" onclick="openMuscle('Calves')">
              <rect x="66" y="262" width="26" height="60" rx="10"/>
              <rect x="108" y="262" width="26" height="60" rx="10"/>
            </g>
            <rect x="60" y="320" width="32" height="14" rx="5" fill="#2a2a2a"/>
            <rect x="108" y="320" width="32" height="14" rx="5" fill="#2a2a2a"/>
          </svg>
          <!-- BACK SVG -->
          <svg id="svgBack" viewBox="0 0 200 420" xmlns="http://www.w3.org/2000/svg" class="hidden">
            <ellipse cx="100" cy="30" rx="22" ry="26" fill="#3a3a3a"/>
            <rect x="91" y="54" width="18" height="14" fill="#3a3a3a"/>
            <rect x="60" y="68" width="80" height="90" rx="8" fill="#2a2a2a"/>
            <g class="muscle-group" fill="#e05555" data-muscle="Traps" onclick="openMuscle('Traps')">
              <polygon points="100,68 70,68 80,90"/>
              <polygon points="100,68 130,68 120,90"/>
            </g>
            <g class="muscle-group" fill="#d4784a" data-muscle="Shoulders" onclick="openMuscle('Shoulders')">
              <ellipse cx="52" cy="82" rx="14" ry="18"/>
              <ellipse cx="148" cy="82" rx="14" ry="18"/>
            </g>
            <g class="muscle-group" fill="#4a8fd4" data-muscle="Lats" onclick="openMuscle('Lats')">
              <polygon points="60,90 60,155 90,130 82,90"/>
              <polygon points="140,90 140,155 110,130 118,90"/>
            </g>
            <g class="muscle-group" fill="#e09b3d" data-muscle="Lower Back" onclick="openMuscle('Lower Back')">
              <rect x="80" y="128" width="40" height="28" rx="5"/>
            </g>
            <g class="muscle-group" fill="#50b86c" data-muscle="Triceps" onclick="openMuscle('Triceps')">
              <rect x="30" y="100" width="16" height="42" rx="8"/>
              <rect x="154" y="100" width="16" height="42" rx="8"/>
            </g>
            <g class="muscle-group" fill="#7db87a" data-muscle="Forearms" onclick="openMuscle('Forearms')">
              <rect x="22" y="146" width="14" height="46" rx="7"/>
              <rect x="164" y="146" width="14" height="46" rx="7"/>
            </g>
            <g class="muscle-group" fill="#9b59b6" data-muscle="Glutes" onclick="openMuscle('Glutes')">
              <ellipse cx="83" cy="178" rx="22" ry="18"/>
              <ellipse cx="117" cy="178" rx="22" ry="18"/>
            </g>
            <g class="muscle-group" fill="#c0504a" data-muscle="Hamstrings" onclick="openMuscle('Hamstrings')">
              <rect x="62" y="198" width="34" height="62" rx="10"/>
              <rect x="104" y="198" width="34" height="62" rx="10"/>
            </g>
            <g class="muscle-group" fill="#c0a050" data-muscle="Calves" onclick="openMuscle('Calves')">
              <rect x="66" y="264" width="26" height="58" rx="10"/>
              <rect x="108" y="264" width="26" height="58" rx="10"/>
            </g>
            <rect x="60" y="320" width="32" height="14" rx="5" fill="#2a2a2a"/>
            <rect x="108" y="320" width="32" height="14" rx="5" fill="#2a2a2a"/>
          </svg>
        </div>
        <div class="muscleLabel" id="muscleLabel">Click a muscle to log workout</div>
      </div>
    </div>

    <!-- HISTORY PAGE -->
    <div class="page" id="historyPage">
      <div class="historyPage">
        <h2>Workout History</h2>
        <div id="historyList"></div>
      </div>
    </div>

    <!-- PROGRESS PAGE -->
    <div class="page" id="progressPage">
      <div class="progressPage">
        <h2>Progress & PRs</h2>
        <div class="prGrid" id="prGrid"></div>
        <div class="chartWrap">
          <h3>Volume Over Time</h3>
          <select id="chartExSelect" onchange="renderChart()"></select>
          <canvas id="progressChart"></canvas>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- WORKOUT MODAL -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <h2 id="modalMuscle"></h2>
    <div class="sub" id="modalDate"></div>
    <div class="exerciseList" id="exerciseList"></div>
    <div class="logSection hidden" id="logSection">
      <h3 id="logExName"></h3>
      <div id="setsContainer"></div>
      <button class="addSetBtn" onclick="addSet()">+ Add Set</button>
    </div>
    <div class="modalBtns">
      <button class="btn sec" onclick="closeModal()">Cancel</button>
      <button class="btn" id="saveBtn" onclick="saveWorkout()" style="display:none">Save Workout</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
